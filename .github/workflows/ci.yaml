name: CI

"on":
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - uses: astral-sh/setup-uv@v8.3.2

      - uses: ./.github/actions/setup-rust

      - name: Install prek
        run: uv tool install "prek==0.4.8"

      - name: Install taplo
        run: cargo install --locked taplo-cli --version 0.10.0

      - name: Run linters
        run: prek run --all-files

  test:
    name: Test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: windows/amd64, runner: windows-latest }
          - { platform: linux/amd64, runner: ubuntu-latest }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm }
          - { platform: darwin/arm64, runner: macos-latest }
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/setup-rust

      - name: Run tests
        run: cargo test --locked
